name: Auto-Train Knowledge AI

# Daily mini-batch retraining. Mini-batch SGD converges in ~100 epochs instead
# of thousands, so a run completes in minutes (well within CI limits and free
# Actions minutes) rather than hitting the 6-hour timeout. Trigger on demand
# any time from the Actions tab.
#
# NOTE: training a 15k-way softmax is inherently costly and gives modest
# accuracy — the corpus is really a retrieval problem. See PR discussion for the
# recommended retrieval-based redesign that needs no training at all.

on:
  schedule:
    - cron: "30 4 * * *"   # daily at 04:30 UTC
  workflow_dispatch:
    inputs:
      epochs:
        description: "Training epochs"
        default: "100"
        type: string
      batch_size:
        description: "Mini-batch size"
        default: "256"
        type: string
      activation:
        description: "Activation function"
        default: "tanh"
        type: choice
        options: ["tanh", "sigmoid", "relu"]

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check if enabled
        id: enabled
        run: |
          python -c "
          import json, sys
          from pathlib import Path
          cfg_path = Path('data/cron_config.json')
          if cfg_path.exists():
              cfg = json.loads(cfg_path.read_text())
              wf = cfg.get('workflows', {}).get('auto_train', {})
              if not wf.get('enabled', True):
                  print('Auto-train disabled via admin')
                  sys.exit(0)
          print('enabled')
          "
          echo "run=true" >> "$GITHUB_OUTPUT"

      - name: Run tests first
        if: steps.enabled.outputs.run == 'true'
        run: python -m pytest tests/ -q

      - name: Train (mini-batch)
        if: steps.enabled.outputs.run == 'true'
        run: |
          python train_knowledge.py \
            --activation "${{ github.event.inputs.activation || 'tanh' }}" \
            --optimizer adam \
            --lr 0.01 \
            --hidden 256 \
            --epochs "${{ github.event.inputs.epochs || '100' }}" \
            --batch-size "${{ github.event.inputs.batch_size || '256' }}"

      - name: Show model stats
        if: steps.enabled.outputs.run == 'true'
        run: |
          echo "=== Model files ==="
          ls -lh models/
          python -c "import json; d=json.load(open('models/answer_map.json')); print(f'{len(d)} answer classes')"
          python -c "import json; d=json.load(open('models/vectorizer.json')); print(f'{len(d[\"vocab\"])} vocab words')"

      - name: Commit updated model
        if: steps.enabled.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/
          if git diff --cached --quiet; then
            echo "No model changes to commit."
          else
            git commit -m "chore(auto-train): daily mini-batch retrain [skip ci]

          $(python -c "from knowledge_base import KNOWLEDGE; print(f'{len(KNOWLEDGE)} base knowledge entries')")
          $(python -c "import json; d=json.load(open('models/answer_map.json')); print(f'{len(d)} answer classes')")"
            git push
          fi
