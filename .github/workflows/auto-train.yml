name: Auto-Train Knowledge AI

# MAXIMUM TRAINING SCHEDULE
# Runs 12x/day (every 2 hours) + on every knowledge push + manual dispatch.
# 3 parallel configs per run = 36 training sessions/day.
# Public repos get unlimited GitHub Actions minutes.
# Each run ≈ 3-5 min × 3 configs × 12/day ≈ ~180 min/day of compute.

on:
  schedule:
    - cron: "0 0 * * *"           # 00:00 UTC
    - cron: "0 2 * * *"           # 02:00 UTC
    - cron: "0 4 * * *"           # 04:00 UTC
    - cron: "0 6 * * *"           # 06:00 UTC
    - cron: "0 8 * * *"           # 08:00 UTC
    - cron: "0 10 * * *"          # 10:00 UTC
    - cron: "0 12 * * *"          # 12:00 UTC
    - cron: "0 14 * * *"          # 14:00 UTC
    - cron: "0 16 * * *"          # 16:00 UTC
    - cron: "0 18 * * *"          # 18:00 UTC
    - cron: "0 20 * * *"          # 20:00 UTC
    - cron: "0 22 * * *"          # 22:00 UTC
  push:
    paths:
      - "knowledge_base.py"
      - "train_knowledge.py"
      - "vectorizer.py"
      - "neural_network.py"
      - "data/extra_knowledge/*.json"
  workflow_dispatch:
    inputs:
      epochs:
        description: "Training epochs"
        default: "5000"
        type: string
      activation:
        description: "Activation function"
        default: "tanh"
        type: choice
        options: ["tanh", "sigmoid", "relu"]
      optimizer:
        description: "Optimizer"
        default: "adam"
        type: choice
        options: ["adam", "momentum", "sgd"]

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Train 5 configs in parallel — best model wins
        include:
          - name: "tanh-adam-5k"
            activation: "tanh"
            optimizer: "adam"
            epochs: 5000
            lr: 0.01
            hidden: 256
          - name: "tanh-adam-8k"
            activation: "tanh"
            optimizer: "adam"
            epochs: 8000
            lr: 0.005
            hidden: 256
          - name: "relu-adam-5k"
            activation: "relu"
            optimizer: "adam"
            epochs: 5000
            lr: 0.005
            hidden: 256
          - name: "sigmoid-momentum-5k"
            activation: "sigmoid"
            optimizer: "momentum"
            epochs: 5000
            lr: 0.05
            hidden: 256
          - name: "tanh-adam-10k"
            activation: "tanh"
            optimizer: "adam"
            epochs: 10000
            lr: 0.003
            hidden: 256
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests first
        run: python -m pytest tests/ -v

      - name: Train — ${{ matrix.name }}
        run: |
          echo "Training with activation=${{ matrix.activation }} optimizer=${{ matrix.optimizer }} lr=${{ matrix.lr }} epochs=${{ matrix.epochs }} hidden=${{ matrix.hidden }}"
          python train_knowledge.py \
            --activation ${{ matrix.activation }} \
            --optimizer ${{ matrix.optimizer }} \
            --lr ${{ matrix.lr }} \
            --epochs ${{ matrix.epochs }} \
            --hidden ${{ matrix.hidden }}

      - name: Show model stats
        run: |
          echo "=== Model files ==="
          ls -lh models/
          echo ""
          echo "=== Answer map entries ==="
          python -c "import json; d=json.load(open('models/answer_map.json')); print(f'{len(d)} answers')"
          echo ""
          echo "=== Vocab size ==="
          python -c "import json; d=json.load(open('models/vectorizer.json')); print(f'{len(d[\"vocab\"])} words')"

      - name: Upload trained model as artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-${{ matrix.name }}
          path: models/
          retention-days: 7

  # Pick the best model and commit it
  select-best:
    needs: train
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Download all model artifacts
      - name: Download all candidate models
        uses: actions/download-artifact@v4
        with:
          path: candidates/
          pattern: model-*

      - name: Select best model by accuracy
        run: |
          python - <<'SCRIPT'
          import json, shutil, sys
          from pathlib import Path
          import numpy as np
          sys.path.insert(0, ".")
          from neural_network import NeuralNetwork
          from vectorizer import BagOfWords
          from knowledge_base import KNOWLEDGE

          questions = [q for q, _, _ in KNOWLEDGE]
          answers = [a for _, a, _ in KNOWLEDGE]

          best_acc = -1
          best_dir = None

          for cand in Path("candidates").iterdir():
              if not cand.is_dir():
                  continue
              try:
                  model = NeuralNetwork.load(cand / "knowledge.npz")
                  bow = BagOfWords.load(cand / "vectorizer.json")
                  ans_map = json.loads((cand / "answer_map.json").read_text())

                  X = bow.transform(questions)
                  preds = model.predict(X)
                  pred_classes = np.argmax(preds, axis=1)

                  correct = 0
                  for i, q in enumerate(questions):
                      pred_answer = ans_map.get(str(pred_classes[i]), "")
                      # Find the expected answer for this question
                      expected = answers[i]
                      if pred_answer == expected:
                          correct += 1

                  acc = correct / len(questions)
                  print(f"  {cand.name}: {acc:.1%} ({correct}/{len(questions)})")

                  if acc > best_acc:
                      best_acc = acc
                      best_dir = cand
              except Exception as e:
                  print(f"  {cand.name}: FAILED — {e}")

          if best_dir is None:
              print("ERROR: No valid candidate models!")
              sys.exit(1)

          print(f"\nBest: {best_dir.name} ({best_acc:.1%})")
          # Copy best to models/
          for f in best_dir.iterdir():
              shutil.copy2(f, Path("models") / f.name)
          print("Copied best model to models/")
          SCRIPT

      - name: Commit updated models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/
          if git diff --cached --quiet; then
            echo "No model changes to commit."
          else
            git commit -m "chore(auto-train): retrain knowledge model [skip ci]

          Trained on $(python -c "from knowledge_base import KNOWLEDGE; print(len(KNOWLEDGE))") knowledge entries
          $(python -c "import json; d=json.load(open('models/answer_map.json')); print(f'{len(d)} answer classes')")
          $(python -c "import json; d=json.load(open('models/vectorizer.json')); print(f'{len(d[\"vocab\"])} vocab words')")"
            git push
          fi
            git push
          fi
